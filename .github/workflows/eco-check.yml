name: E.C.O. operational check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  eco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run E.C.O. operational check
        run: make eco-check-clean
